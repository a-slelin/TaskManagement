spring:
  config:
    activate:
      on-profile: test
  application:
    name: Task Management System
    version: 6.0

  datasource:
    url: jdbc:h2:mem:TaskManagement;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: admin
    password: admin

  jpa:
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        hbm2ddl:
          auto: validate
    open-in-view: true

  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: true
    contexts: test

logging:
  level:
    root: info